# ECPlus Konfiguration
settings:
  max-pages: 3   # Anzahl der Seiten, frei anpassbar
# Spracheinstellung:
# auto = Sprache wird automatisch anhand der Spieler-Sprache erkannt
# xx_xx = Erzwingt eine bestimmte Sprache (z.B. de_de, en_gb, fr_fr)
language: auto

# Hinweis:
# Alle Sprachdateien befinden sich im Ordner:
# plugin/ECPLus/lang/
#
# Unterstützte Sprachen:
# de_de, en_us, en_gb, fr_fr, es_es, es_mx, pt_br, pt_pt,
# pl_pl, nl_nl, it_it, cs_cz, sk_sk, hu_hu,
# sv_se, da_dk, nb_no, fi_fi,
# el_gr, uk_ua, ru_ru, ro_ro, bg_bg,
# hr_hr, sr_sp, he_il, ar_sa,
# ja_jp, ko_kr, zh_cn, zh_tw